services:
  ai-telegram-bridge:
    build: .
    image: ai-telegram-bridge:local
    restart: unless-stopped
    environment:
      AI_TELEGRAM_BOT_TOKEN: ${AI_TELEGRAM_BOT_TOKEN:?set AI_TELEGRAM_BOT_TOKEN}
      AI_TELEGRAM_ALLOWED_USER_ID: ${AI_TELEGRAM_ALLOWED_USER_ID:?set AI_TELEGRAM_ALLOWED_USER_ID}
      AI_TELEGRAM_DEFAULT_CWD: ${AI_TELEGRAM_DEFAULT_CWD:-/workspace}
      AI_TELEGRAM_ACP_COMMAND: ${AI_TELEGRAM_ACP_COMMAND:-codex-acp}
      AI_TELEGRAM_DEFAULT_BACKEND: ${AI_TELEGRAM_DEFAULT_BACKEND:-codex}
    volumes:
      - bridge-data:/app/data
      - ./bot.json:/app/bot.json:ro
      - ${AI_TELEGRAM_WORKSPACE:-.}:/workspace

volumes:
  bridge-data:
